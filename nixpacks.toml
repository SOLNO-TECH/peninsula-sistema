# Dokploy Nixpacks
# Node 20 + Express API + static frontend

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = [
  "npm run build",
  "test -f dist/peninsula-hero-v2.png",
  "echo deploy-bust-2026-07-23-425d0a0"
]

[start]
cmd = "node server/index.js"
